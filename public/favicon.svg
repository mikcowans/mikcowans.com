<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#181613"/>
  <!-- Magnifying glass lens -->
  <circle cx="11" cy="11" r="11" fill="#181613" stroke="#e8963a" stroke-width="1.5"/>
  <!-- Handle (shorter) -->
  <line x1="18.8" y1="18.8" x2="27" y2="27" stroke="#e8963a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Initials inside lens -->
  <text
    x="11"
    y="14.5"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="12"
